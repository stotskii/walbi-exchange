<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <!-- tinted background — matches oklch ink-08 token, no #000/#fff -->
    <meta name="theme-color" content="#0a0e15" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="Walbi Exchange — AI-first криптобиржа: торговые AI-агенты, мемепул, прогнозы."
    />

    <!-- preconnect: backend APIs + font hosts. Saves DNS+TLS RTT on LCP. -->
    <link rel="preconnect" href="https://gw.walbi.com" crossorigin />
    <link rel="preconnect" href="https://ws.walbi.com" crossorigin />
    <link rel="preconnect" href="https://content.walbi.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://cdn.fontshare.com" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Critical font CSS — high priority for LCP (display text) -->
    <link
      rel="preload"
      as="style"
      href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap"
    />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
    />

    <title>Walbi Exchange</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
